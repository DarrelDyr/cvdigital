<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Darrel D.R - CV DIGITAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- VARIABLE: GAMPANG BUAT GANTI WARNA --- */
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #facc15; /* Warna Kuning */
            --text-main: #ffffff;
            --text-dim: #cccccc;
            --gap-size: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 40px 0 20px;
        }

        .profile-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.2);
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .role {
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- ABOUT CARD --- */
        .about-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #333;
        }

        /* --- SECTION SERTIFIKAT --- */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 30px 0 15px;
            text-align: center;
            display: block;
            /* Garis bawah kustom */
            border-bottom: 2px solid var(--accent-color);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 5px;
        }

        .grid-sertifikat {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 kolom */
            gap: var(--gap-size);
        }

        .sertifikat-item {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .sertifikat-item:hover {
            transform: translateY(-5px);
        }

        .sertifikat-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 40px 0;
            color: #555;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* Tampilan HP: Tetap 2 kolom tapi sedikit lebih kecil gap-nya */
        @media (max-width: 400px) {
            .grid-sertifikat {
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <section class="hero">
            <div class="profile-wrapper">
                <img src="20251101_200252.jpg" alt="Muhammad Darrel" class="profile-img">
            </div>
            <h1 class="name">Muhammad Darrel D.R</h1>
            <p class="role">SIJA - SMKN 1 CIMAHI</p>
        </section>

        <section class="about-card">
            <p>Hi everyone! I'm Darrel. <br> Welcome to my personal digital CV.</p>
        </section>

        <h2 class="section-title">My Certificates</h2>
        
        <div class="grid-sertifikat">
            <div class="sertifikat-item">
                <img src="sertifikatidnetworkers.png" alt="Sertifikat IDN 1">
            </div>
            <div class="sertifikat-item">
                <img src="sertifikatidnetworkers.png" alt="Sertifikat IDN 2">
            </div>
            <div class="sertifikat-item">
                <img src="sertifikatidnetworkers.png" alt="Sertifikat IDN 3">
            </div>
            <div class="sertifikat-item">
                <img src="sertifikatidnetworkers.png" alt="Sertifikat IDN 4">
            </div>
        </div>

        <footer>
            &copy; 2026 Muhammad Darrel Danadyaksa R.
        </footer>

    </div>

</body>
</html>
